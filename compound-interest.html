<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сложный процент — Калькулятор</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(160deg, #0a0a0f 0%, #111827 40%, #0f172a 100%);
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .header { text-align: center; margin-bottom: 28px; }

  h1 {
    font-weight: 900;
    font-size: 32px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle { font-weight: 300; font-size: 14px; color: #64748b; margin-top: 4px; }

  .wrap { max-width: 720px; margin: 0 auto; }

  .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .input-group { flex: 1 1 140px; }

  .input-group label {
    display: block; font-size: 11px; font-weight: 500; color: #94a3b8;
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  .input-wrap { position: relative; display: flex; align-items: center; }

  .input-wrap input {
    width: 100%; padding: 10px 36px 10px 14px; font-size: 16px;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: #f1f5f9; outline: none; transition: border-color 0.2s;
  }

  .input-wrap input:focus { border-color: rgba(139,92,246,0.5); }

  .input-wrap .sfx {
    position: absolute; right: 12px; font-size: 13px;
    color: #64748b; font-weight: 500; pointer-events: none;
  }

  .cards { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }

  .card {
    flex: 1 1 100px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 14px; text-align: center;
  }

  .card .lbl {
    font-size: 11px; color: #64748b; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 4px;
  }

  .card .val {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: #f1f5f9;
  }

  .card .val.g { color: #34d399; }
  .card .val.y { color: #fbbf24; }

  .bar {
    position: relative; height: 32px; background: rgba(52,211,153,0.15);
    border-radius: 8px; overflow: hidden; margin-bottom: 28px;
  }

  .bar-fill {
    height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 8px; transition: width 0.5s ease;
  }

  .bar-labels {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 12px; font-size: 11px; font-weight: 600; color: #e2e8f0;
  }

  h2 { font-weight: 700; font-size: 18px; margin-bottom: 14px; color: #cbd5e1; }

  .mb {
    margin-bottom: 8px; border-radius: 10px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .mh {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.04);
    border: none; color: #e2e8f0; cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 14px; text-align: left;
    transition: background 0.2s;
  }

  .mh:hover { background: rgba(255,255,255,0.07); }
  .ml { display: flex; align-items: center; gap: 8px; }
  .ma { font-size: 10px; color: #64748b; transition: transform 0.2s; }
  .mn { font-weight: 600; }
  .mr { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }

  .mrng {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #94a3b8;
  }

  .mgrw {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: #34d399; font-weight: 600;
  }

  .tw {
    overflow: hidden; background: rgba(0,0,0,0.2);
    max-height: 0; transition: max-height 0.4s ease;
  }

  .tw.open { max-height: 6000px; overflow-x: auto; }

  table {
    width: 100%; border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }

  th {
    padding: 10px 8px; text-align: right; font-size: 10px; font-weight: 600;
    color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap; position: sticky; top: 0; background: rgba(15,23,42,0.95);
  }

  th:first-child { text-align: center; }
  tr:nth-child(odd) td { background: rgba(255,255,255,0.02); }
  td { padding: 8px; text-align: right; white-space: nowrap; }
  td.d { text-align: center; color: #64748b; font-weight: 600; font-size: 11px; }
  td.b { color: #cbd5e1; }
  td.c { color: #94a3b8; font-size: 11px; }
  td.p { color: #34d399; font-weight: 600; }
  td.r { color: #f1f5f9; font-weight: 700; }

  @media (max-width: 500px) {
    td.c, th:nth-child(3) { display: none; }
    table { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Сложный процент</h1>
  <p class="subtitle">Калькулятор с ежедневной разбивкой</p>
</div>

<div class="wrap">
  <div class="controls">
    <div class="input-group">
      <label>Начальная сумма</label>
      <div class="input-wrap">
        <input type="number" id="inp-p" value="100000">
        <span class="sfx">₽</span>
      </div>
    </div>
    <div class="input-group">
      <label>Процент в день</label>
      <div class="input-wrap">
        <input type="number" id="inp-r" value="2" step="0.1">
        <span class="sfx">%</span>
      </div>
    </div>
    <div class="input-group">
      <label>Количество дней</label>
      <div class="input-wrap">
        <input type="number" id="inp-d" value="90">
        <span class="sfx">дн</span>
      </div>
    </div>
  </div>

  <div class="cards" id="cards"></div>
  <div class="bar" id="bar"></div>
  <h2>Расчёт по дням</h2>
  <div id="months"></div>
</div>

<script>
const f = n => n.toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2});
const fs = n => n>=1e6?(n/1e6).toFixed(1)+'M':Math.round(n).toLocaleString('ru-RU');

function calc(){
  const P=+(document.getElementById('inp-p').value)||0;
  const r=((+document.getElementById('inp-r').value)||0)/100;
  const D=Math.min((+document.getElementById('inp-d').value)||0,730);
  const rows=[];
  let a=P;
  for(let d=1;d<=D;d++){
    const i=a*r, n=a+i;
    rows.push({day:d,before:a,interest:i,after:n});
    a=n;
  }
  const fin=rows.length?rows[rows.length-1].after:P;
  const prof=fin-P;
  const mult=P>0?(fin/P):0;

  document.getElementById('cards').innerHTML=`
    <div class="card"><div class="lbl">Итого</div><div class="val">${f(fin)} ₽</div></div>
    <div class="card"><div class="lbl">Прибыль</div><div class="val g">+${f(prof)} ₽</div></div>
    <div class="card"><div class="lbl">Множитель</div><div class="val y">×${mult.toFixed(2)}</div></div>`;

  const pct=fin>0?Math.min((P/fin)*100,100):0;
  document.getElementById('bar').innerHTML=`
    <div class="bar-fill" style="width:${pct}%"></div>
    <div class="bar-labels"><span>Вложено: ${fs(P)}</span><span>Прибыль: ${fs(prof)}</span></div>`;

  const mons=[];
  for(let i=0;i<rows.length;i+=30){
    const ch=rows.slice(i,i+30);
    mons.push({num:Math.floor(i/30)+1,days:ch,s:ch[0].before,e:ch[ch.length-1].after});
  }

  const el=document.getElementById('months');
  el.innerHTML='';

  mons.forEach(m=>{
    const lbl=m.days.length===30?`Месяц ${m.num}`:`Дни ${m.days[0].day}–${m.days[m.days.length-1].day}`;
    const g=m.e-m.s;
    const div=document.createElement('div');
    div.className='mb';
    div.innerHTML=`
      <button class="mh" onclick="tog(this)">
        <div class="ml"><span class="ma">▶</span><span class="mn">${lbl}</span></div>
        <div class="mr">
          <span class="mrng">${fs(m.s)} → ${fs(m.e)} ₽</span>
          <span class="mgrw">+${f(g)} ₽</span>
        </div>
      </button>
      <div class="tw">
        <table>
          <thead><tr>
            <th style="width:50px">День</th><th>Было</th>
            <th>× ${r}</th><th>+Прибавка</th><th>Стало</th>
          </tr></thead>
          <tbody>${m.days.map(row=>`<tr>
            <td class="d">${row.day}</td>
            <td class="b">${f(row.before)}</td>
            <td class="c">${f(row.before)} × ${r}</td>
            <td class="p">+${f(row.interest)}</td>
            <td class="r">${f(row.after)}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>`;
    el.appendChild(div);
  });
}

function tog(btn){
  const w=btn.nextElementSibling;
  const ar=btn.querySelector('.ma');
  const open=w.classList.contains('open');
  document.querySelectorAll('.tw.open').forEach(e=>{
    e.classList.remove('open');
    e.previousElementSibling.querySelector('.ma').textContent='▶';
  });
  if(!open){w.classList.add('open');ar.textContent='▼';}
}

document.getElementById('inp-p').addEventListener('input',calc);
document.getElementById('inp-r').addEventListener('input',calc);
document.getElementById('inp-d').addEventListener('input',calc);
calc();
</script>
</body>
</html>
